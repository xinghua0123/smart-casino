version: "3.8"

services:
  # --- Infrastructure ---
  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: "demo-smart-casino-floor-001"
    healthcheck:
      test: /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1
      interval: 10s
      timeout: 5s
      retries: 10

  risingwave:
    image: risingwavelabs/risingwave:v2.8.1
    command: single_node
    ports:
      - "4566:4566"   # SQL frontend
      - "5691:5691"   # Dashboard
    volumes:
      - risingwave-data:/risingwave
    depends_on:
      kafka:
        condition: service_healthy

  # --- Setup ---
  kafka-init:
    image: apache/kafka:3.9.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Creating Kafka topics..."
        for topic in gaming_events fnb_events hotel_events recommendations actionable_recommendations; do
          /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic $$topic --partitions 1 --replication-factor 1
        done
        echo "All topics created."

  rw-setup:
    image: postgres:16-alpine
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      risingwave:
        condition: service_started
    volumes:
      - ./risingwave_sql:/sql
    entrypoint: ["sh", "/sql/setup.sh"]
    environment:
      RISINGWAVE_HOST: risingwave
      RISINGWAVE_PORT: 4566

  # --- Application ---
  data-producer:
    build: ./data_producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  ml-service:
    build: ./ml_service
    depends_on:
      kafka:
        condition: service_healthy
      risingwave:
        condition: service_started
      rw-setup:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      RISINGWAVE_HOST: risingwave
      RISINGWAVE_PORT: 4566

  dashboard:
    build: ./dashboard
    ports:
      - "8501:8501"
    depends_on:
      risingwave:
        condition: service_started
      rw-setup:
        condition: service_completed_successfully
    environment:
      RISINGWAVE_HOST: risingwave
      RISINGWAVE_PORT: 4566
      LLM_API_KEY: ${LLM_API_KEY:-}

volumes:
  risingwave-data:
